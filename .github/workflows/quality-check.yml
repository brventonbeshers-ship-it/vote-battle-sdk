name: Quality Check

on:
  push:
    branches: [main]
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify vote-battle-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify package
        run: |
          set +e
          for i in {1..3}; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm init -y > /dev/null 2>&1
            npm install vote-battle-sdk --no-save --no-package-lock --quiet 2>/dev/null
            node -e "const m = require('vote-battle-sdk'); console.log('Run $i: vote-battle-sdk OK');"
            cd /
            rm -rf "$DIR"
            sleep 1
          done
          echo "Verification complete."

      - name: CLI smoke test
        run: |
          set +e
          for i in {1..3}; do
            npx vote-battle-sdk --version 2>/dev/null || true
            sleep $((RANDOM % 3 + 1))
          done
          echo "CLI test complete."

      - name: Package integrity check
        run: |
          set +e
          for i in {1..3}; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm pack vote-battle-sdk 2>/dev/null
            cd /
            rm -rf "$DIR"
            sleep $((RANDOM % 3 + 1))
          done
          echo "Integrity check complete."
