name: Scheduled Quality Check

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  quality-check:
    name: Package Quality Assurance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        continue-on-error: true
        run: npm test

      - name: Build package
        continue-on-error: true
        run: npm run build

      - name: Verify published package installs cleanly
        run: |
          mkdir -p /tmp/quality-verify
          cd /tmp/quality-verify
          npm init -y
          npm install vote-battle-sdk

      - name: Validate published exports
        continue-on-error: true
        run: |
          cd /tmp/quality-verify
          node -e "
            const sdk = require('vote-battle-sdk');
            console.log('Published package OK');
            console.log('Exports:', Object.keys(sdk));
          "

      - name: Cleanup temp directory
        run: rm -rf /tmp/quality-verify
