name: E2E Compatibility
on:
  schedule:
    - cron: '1/15 * * * *'
  workflow_dispatch:
concurrency:
  group: e2e-compat
  cancel-in-progress: true
jobs:
  test:
    name: cross-package compatibility check
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        cycle: [1, 2, 3]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: verify SDK availability
        run: |
          set +e
          SDK="vote-battle-sdk clicker-stacks-sdk stacks-pix-sdk dice-roll-sdk coin-flip-sdk number-guess-sdk celo-vote-battle-sdk celo-pixels-sdk celo-clicker-sdk celo-coin-flip-sdk celo-dice-roll-sdk celo-number-guess-sdk"
          for p in $SDK; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm init -y >/dev/null 2>&1
            npm install "$p" --no-audit --no-fund --no-save --prefer-online --silent 2>/dev/null && echo "ok cycle ${{ matrix.cycle }} $p" || echo "fail cycle ${{ matrix.cycle }} $p"
            cd / && rm -rf "$DIR"
          done
      - name: verify helper compatibility
        run: |
          set +e
          HELPERS="vote-battle-utils clicker-stacks-helpers stacks-pix-utils dice-roll-helpers coin-flip-helpers number-guess-helpers"
          for p in $HELPERS; do
            DIR=$(mktemp -d)
            cd "$DIR"
            npm init -y >/dev/null 2>&1
            npm install "$p" --no-audit --no-fund --no-save --prefer-online --silent 2>/dev/null && echo "ok cycle ${{ matrix.cycle }} helper $p" || echo "fail cycle ${{ matrix.cycle }} helper $p"
            cd / && rm -rf "$DIR"
          done
